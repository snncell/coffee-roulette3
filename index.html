<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커피룰렛☕</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5efe6;
}

header {
  background: #6f4e37;
  color: white;
  padding: 16px;
  text-align: center;
  font-weight: bold;
}

.container {
  padding: 16px;
}

select, button {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #6f4e37;
  color: white;
  font-size: 16px;
}

.card {
  background: white;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>☕ 커피룰렛</header>

<div class="container">

<select id="distance">
  <option value="">거리</option>
  <option value="near">가까움</option>
  <option value="mid">중간</option>
  <option value="far">멀음</option>
</select>

<select id="size">
  <option value="">매장 크기</option>
  <option value="small">좁음</option>
  <option value="medium">보통</option>
  <option value="large">넓음</option>
</select>


<button onclick="recommend()">🎯 그냥 골라줘</button>

<div id="result"></div>

</div>

<script>

let cafes = [];

async function loadData() {
  const res = await fetch("https://opensheet.elk.sh/1hrK3tneA-m4Ltl9vmIdFn4rtj1HmZMxmfrIsZNOnbrE/cafes");
  cafes = await res.json();
}

function recommend() {
  if (cafes.length === 0) {
    alert("데이터 로딩중...");
    return;
  }

  const distance = document.getElementById("distance").value;
  const size = document.getElementById("size").value;

  let filtered = cafes.filter(cafe => {
    return (!distance || cafe.distance === distance) &&
           (!size || cafe.size === size)
  });

  if (filtered.length === 0) {
    document.getElementById("result").innerHTML = "😢 조건 없음";
    return;
  }

  const picks = filtered.sort(() => 0.5 - Math.random()).slice(0, 3);

  document.getElementById("result").innerHTML = picks.map(cafe => `
    <div class="card" onclick="window.open('${cafe.map}')">
      <h3>${cafe.name}</h3>
      <p>${cafe.vibe} / ${cafe.size}</p>
    </div>
  `).join("");
}

window.onload = loadData;

</script>

</body>
</html>
