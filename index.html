<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커피룰렛☕</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f7f3ef;
  color: #3e2f2f;
}

/* 헤더 */
header {
  background: #6f4e37;
  color: white;
  padding: 18px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* 컨테이너 */
.container {
  padding: 16px;
}

/* 필터 */
.filters {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

select {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: white;
  font-size: 14px;
}

/* 버튼 */
button {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background: #6f4e37;
  color: white;
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 15px;
}

/* 카드 */
.card {
  background: white;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.06);
}

.card h3 {
  margin: 0 0 8px 0;
}

.size {
  font-size: 13px;
  color: #888;
}

/* 지도 버튼 */
.map-btn {
  margin-top: 10px;
  padding: 10px;
  background: #eee;
  border-radius: 8px;
  text-align: center;
  font-size: 13px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>☕ 커피룰렛</header>

<div class="container">

  <!-- 필터 -->
  <div class="filters">
    <select id="distance">
      <option value="">거리</option>
      <option value="near">가까움</option>
      <option value="mid">중간</option>
      <option value="far">멀음</option>
    </select>

    <select id="size">
      <option value="">매장 크기</option>
      <option value="small">좁음</option>
      <option value="medium">보통</option>
      <option value="large">넓음</option>
    </select>
  </div>

  <!-- 버튼 -->
  <button onclick="recommend()">🎯 그냥 골라줘</button>

  <!-- 결과 -->
  <div id="result"></div>

</div>

<script>

let cafes = [];

// 데이터 불러오기
async function loadData() {
  const res = await fetch("https://opensheet.elk.sh/1hrK3tneA-m4Ltl9vmIdFn4rtj1HmZMxmfrIsZNOnbrE/cafes");
  cafes = await res.json();
}

// 추천
function recommend() {
  if (cafes.length === 0) {
    alert("데이터 로딩중...");
    return;
  }

  const distance = document.getElementById("distance").value;
  const size = document.getElementById("size").value;

  let filtered = cafes.filter(cafe => {
    return (!distance || cafe.distance === distance) &&
           (!size || cafe.size === size);
  });

  if (filtered.length === 0) {
    document.getElementById("result").innerHTML = "😢 조건에 맞는 카페 없음";
    return;
  }

  const picks = filtered.sort(() => 0.5 - Math.random()).slice(0, 5);

  document.getElementById("result").innerHTML = picks.map(cafe => `
    <div class="card">
      <h3 onclick="window.open('${cafe.map}')" style="cursor:pointer;">
        ${cafe.name}
      </h3>

      <div class="size">📏 ${cafe.size}</div>

      <div class="map-btn" onclick="window.open('${cafe.map}')">
        📍 네이버 지도에서 보기
      </div>
    </div>
  `).join("");
}

window.onload = loadData;

</script>

</body>
</html>
